name: ICU MLOps Industrial Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    # 1. DEPENDENCY CACHING
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8 black

    # 2. MANDATORY LINTING
    - name: Run Linting (flake8 & black)
      run: |
        # Fail the pipeline if there are any formatting or syntax errors
        flake8 src/ api/ --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check src/ api/

    # 3. CATEGORIZED TESTING
    - name: Run Data Validation Tests
      run: pytest tests/test_data_validation.py -v

    - name: Run Model & Unit Tests
      run: pytest tests/test_model.py -v

    - name: Run API Contract Tests
      run: pytest tests/test_api.py -v

    # 4. LIGHT TRAINING (WITH TIMEOUT)
    - name: Run Light Training Pipeline
      timeout-minutes: 2
      run: |
        # Generate tiny synthetic dataset for CI logic verification
        python src/mock_generator.py
        
        # Run pipeline stages
        python pipeline.py --step data
        python pipeline.py --step features
        python pipeline.py --step validate
        python pipeline.py --step train

    # 5. DOCKER BUILD & HEALTH CHECK
    - name: Build Docker Image
      run: |
        docker build -t icu-monitor-test:latest .

    - name: Run Container & Local Health Check
      run: |
        # Start container in background
        docker run -d --name test-api -p 8000:8000 icu-monitor-test:latest
        
        # Wait for API to start
        sleep 5
        
        # Verify service is alive
        curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
        
        # Cleanup
        docker stop test-api
        docker rm test-api

